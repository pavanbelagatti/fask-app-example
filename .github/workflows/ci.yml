name: CI

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why this CI run was triggered'
        required: false
        default: 'Manual trigger from Port'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo trigger reason
        run: |
          echo "CI triggered."
          echo "Reason: ${{ github.event.inputs.reason || 'push or PR' }}"
          echo "Event: ${{ github.event_name }}"
          echo "Actor: ${{ github.actor }}"

      - name: Simulated build
        run: |
          echo "Building..."
          sleep 3
          echo "Build complete"

      - name: Run unit tests
        run: |
          echo "Running unit tests..."
          echo "FAILED tests/test_app.py::test_home_route - AssertionError: expected 200 got 500"
          echo "FAILED tests/test_app.py::test_create_user - TypeError: argument of type NoneType is not iterable"
          echo "2 failed, 14 passed in 3.42s"
          exit 1

      - name: Done
        run: echo "CI succeeded"
