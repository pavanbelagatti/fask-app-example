name: Sync PR to Port

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  sync-to-port:
    runs-on: ubuntu-latest
    steps:
      - name: Get Port token
        id: token
        run: |
          TOKEN=$(curl -s -X POST https://api.getport.io/v1/auth/access_token \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"${{ secrets.PORT_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.PORT_CLIENT_SECRET }}\"}" \
            | jq -r '.accessToken')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upsert PR entity in Port
        run: |
          curl -s -X POST \
            "https://api.getport.io/v1/blueprints/githubPullRequest/entities?upsert=true&merge=true" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"identifier\": \"${{ github.event.pull_request.id }}\",
              \"title\": \"${{ github.event.pull_request.title }}\",
              \"properties\": {
                \"status\": \"open\",
                \"link\": \"${{ github.event.pull_request.html_url }}\",
                \"prNumber\": ${{ github.event.pull_request.number }},
                \"branch\": \"${{ github.head_ref }}\",
                \"createdAt\": \"${{ github.event.pull_request.created_at }}\",
                \"updatedAt\": \"${{ github.event.pull_request.updated_at }}\"
              },
              \"relations\": {
                \"repository\": \"${{ github.event.repository.name }}\",
                \"service\": \"shipment\"
              }
            }"
