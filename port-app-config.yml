resources:
  - kind: workflow-run
    selector:
      query: 'true'
    port:
      entity:
        mappings:
          identifier: .id | tostring
          title: .name + " #" + (.run_number | tostring)
          blueprint: '"workflow_run"'
          properties:
            status: .status
            conclusion: .conclusion
            workflow_name: .name
            run_number: .run_number
            event: .event
            branch: .head_branch
            commit_sha: .head_sha
            commit_message: .head_commit.message | split("\n")[0]
            actor: .actor.login
            started_at: .run_started_at
            completed_at: .updated_at
            duration_seconds: >-
              (.run_started_at as $start
              | .updated_at as $end
              | if $start and $end
                then (($end | fromdateiso8601) - ($start | fromdateiso8601))
                else null end)
            run_url: .html_url
            attempt: .run_attempt
            is_pr_triggered: (.event == "pull_request")
          relations:
            repository: .repository.full_name | gsub("/"; "-")
            pull_request: '.pull_requests[0].id // null | tostring'
