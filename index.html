<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fask-app-example — Deployed via Port</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 3rem;
      max-width: 540px;
      text-align: center;
    }
    h1 { font-size: 2.25rem; margin-bottom: 0.75rem; }
    .subtitle { font-size: 1.125rem; opacity: 0.85; margin-bottom: 2rem; }
    .meta {
      display: grid;
      gap: 0.5rem;
      font-size: 0.875rem;
      opacity: 0.8;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .meta div { display: flex; justify-content: space-between; }
    .meta span:first-child { opacity: 0.7; }
    .pulse {
      display: inline-block;
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      margin-right: 0.5rem;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 fask-app-example</h1>
    <p class="subtitle"><span class="pulse"></span>Live and deployed from Port</p>
    <div class="meta">
      <div><span>Service</span><span>shipment</span></div>
      <div><span>Triggered via</span><span>Port self-service</span></div>
      <div><span>Deployed to</span><span id="env">Vercel</span></div>
      <div><span>Deploy time</span><span id="time"></span></div>
    </div>
  </div>
  <script>
    document.getElementById('time').textContent = new Date().toLocaleString();
  </script>
</body>
</html>
